name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --locked --dev
      - run: uv run ruff check .
      - run: uv run mypy src
      - run: uv run pytest
      - run: uv run clpg conformance run examples/conformance --json
      - name: Schema export smoke
        run: |
          tmpdir="$(mktemp -d)"
          uv run clpg schema export "$tmpdir" --json
      - run: uv build
      - name: Local wheel smoke
        run: uv run --with ./dist/clpg-0.1.1-py3-none-any.whl clpg version --json

  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync --locked --dev
      - run: uv run pip-audit
